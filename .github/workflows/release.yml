name: "Build Desktop (Windows + macOS)"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app (installer)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Wireline ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads
            - **Windows installer** — `Wireline_*_x64-setup.exe` (double-click to install)
            - **Windows portable / green build** — `Wireline_portable_*_x64.zip` (unzip and run `Wireline.exe`, no install needed)
            - **macOS** — `Wireline_*_universal.dmg` (Intel + Apple Silicon; first launch: right-click → Open, since the app is unsigned)
          releaseDraft: false
          prerelease: false

      - name: Package portable (green) zip
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "Wireline.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path "src-tauri/target/release" -Filter "wireline.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($exe) {
            $zipName = "Wireline_portable_${{ github.ref_name }}_x64.zip"
            Compress-Archive -Path $exe.FullName -DestinationPath $zipName
            echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV
            echo "Packaged: $zipName"
          } else {
            echo "Warning: exe not found, skipping portable zip"
          }

      - name: Upload portable zip to release
        if: env.ZIP_PATH != '' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ZIP_PATH }}

      - name: Upload build artifacts (for manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: wireline-windows
          path: |
            src-tauri/target/release/Wireline.exe
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain (both Apple targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm install

      - name: Build the app (universal .dmg / .app)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Wireline ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin --bundles dmg

      - name: Upload build artifacts (for manual runs)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: wireline-macos
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
